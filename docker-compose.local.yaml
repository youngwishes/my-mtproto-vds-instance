services:
  telemt-setup:
    image: alpine:3
    restart: "no"
    volumes:
      - ./telemt:/etc/telemt:rw
    command: >
      sh -c '[ -f /etc/telemt/telemt.toml ] ||
      cp /etc/telemt/telemt.example.toml /etc/telemt/telemt.toml'

  telemt:
    image: ghcr.io/telemt/telemt:latest
    container_name: telemt
    restart: unless-stopped
    user: "root"
    working_dir: /run/telemt
    environment:
      RUST_LOG: "info"
    command: /usr/local/bin/telemt /etc/telemt/telemt.toml
    volumes:
      - ./telemt:/etc/telemt:rw
    security_opt:
      - no-new-privileges:true
    ports:
      - "443:443/tcp"
      - "9091:9091"
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    tmpfs:
      - /run/telemt:rw,mode=1777,size=4m
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M
    depends_on:
      api:
        condition: service_started
      telemt-setup:
        condition: service_completed_successfully
    networks:
      - telemt-network
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    logging:
      driver: "local"
      options:
        max-size: "10m"
        max-file: "3"

  api:
    build: .
    container_name: telemt-api
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
    volumes:
      - ./src:/app/src/
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - telemt-network
    logging:
      driver: "local"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  telemt-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
