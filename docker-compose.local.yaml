services:
  telemt:
    image: whn0thacked/telemt-docker:3.3.28
    container_name: telemt
    restart: unless-stopped
    environment:
      RUST_LOG: "info"
    command: ["/etc/telemt/telemt.toml"]
    volumes:
      - ./telemt:/etc/telemt/
    ports:
      - "443:443/tcp"
      - "9091:9091"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    tmpfs:
      - /tmp:rw,nosuid,nodev,noexec,size=16m
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M
    depends_on:
      - api

  api:
    build: .
    container_name: telemt-api
    ports:
      - "0.0.0.0:8000:8000"
    volumes:
      - ./telemt/telemt.toml:/app/telemt/telemt.toml
      - ./src:/app/src/
    env_file:
      - .env
    restart: unless-stopped
