services:
  telemt:
    image: ghcr.io/telemt/telemt:latest
    container_name: telemt
    restart: unless-stopped
    environment:
      RUST_LOG: "info"
    volumes:
      - ./telemt/telemt.toml:/app/config.toml:rw
    security_opt:
      - no-new-privileges:true
    ports:
      - "443:443/tcp"
      - "9090:9090"
      - "9091:9091"
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    tmpfs:
      - /run/telemt:rw,mode=1777,size=4m
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M
    depends_on:
      - api
    networks:
      - telemt-network
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    logging:
      driver: "local"
      options:
        max-size: "10m"
        max-file: "3"

  api:
    build: .
    container_name: telemt-api
    ports:
      - "8000:8000"
    volumes:
      - ./telemt/telemt.toml:/app/telemt/telemt.toml
      - ./src:/app/src/
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - telemt-network
    logging:
      driver: "local"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  telemt-network:
    driver: bridge
    ipam:
      config:
        - subnet: ${NETWORK_SUBNET}/16
