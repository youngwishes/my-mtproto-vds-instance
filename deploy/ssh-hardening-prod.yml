---
- name: Disable SSH password authentication on production
  hosts: mtproto_prod
  become: true
  gather_facts: false
  serial: 1
  any_errors_fatal: true
  pre_tasks:
    - name: Wait for stable SSH access
      ansible.builtin.wait_for_connection:
        timeout: 180
        connect_timeout: 10
        sleep: 5
  roles:
    - role: ssh_hardening
