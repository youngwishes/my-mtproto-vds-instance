---
- name: Deploy MTProto VDS Instance
  hosts: mtproto_servers
  become: true

  vars:
    repo_url: https://github.com/youngwishes/my-mtproto-vds-instance.git
    deploy_dir: /opt/mtproto
    repo_branch: main
    swap_size_mb: 2048

  tasks:
    - name: Check if swap already exists
      stat:
        path: /swapfile
      register: swapfile

    - name: Create swap file
      command: fallocate -l {{ swap_size_mb }}M /swapfile
      when: not swapfile.stat.exists

    - name: Set swap file permissions
      file:
        path: /swapfile
        mode: '0600'
      when: not swapfile.stat.exists

    - name: Format swap
      command: mkswap /swapfile
      when: not swapfile.stat.exists

    - name: Enable swap
      command: swapon /swapfile
      when: not swapfile.stat.exists

    - name: Persist swap in fstab
      lineinfile:
        path: /etc/fstab
        line: '/swapfile none swap sw 0 0'
        state: present

    - name: Set swappiness to 10
      sysctl:
        name: vm.swappiness
        value: '10'
        state: present
        sysctl_file: /etc/sysctl.d/99-swappiness.conf

    - name: Install git
      apt:
        name: git
        state: present
        update_cache: true

    - name: Install Docker if not present
      shell: curl -fsSL https://get.docker.com | sh
      args:
        creates: /usr/bin/docker

    - name: Ensure Docker is running
      service:
        name: docker
        state: started
        enabled: true

    - name: Clone or update repository
      git:
        repo: "{{ repo_url }}"
        dest: "{{ deploy_dir }}"
        version: "{{ repo_branch }}"
        force: true

    - name: Create .env from example (skip if already exists)
      copy:
        src: "{{ deploy_dir }}/.env.example"
        dest: "{{ deploy_dir }}/.env"
        remote_src: true
        force: false

    - name: Start containers
      shell:
        cmd: docker compose up -d --build
        chdir: "{{ deploy_dir }}"
